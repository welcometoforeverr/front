<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4285f4">
    <link rel="apple-touch-icon" href="/icons/favicon-152x152.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/icons/favicon.ico" sizes="16x16" type="image/x-icon">
    <title>Заметки (13-18)</title>
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="shell-page">
        <div class="shell-card">
            <header class="container">
                <nav class="tabs is-center shell-tabs">
                    <button id="home-btn" class="tab active col-6" type="button">Главная</button>
                    <button id="about-btn" class="tab col-6" type="button">О приложении</button>
                </nav>
            </header>

            <main id="app-content" class="container shell-content"></main>

            <footer class="is-center shell-footer">
                <button id="enable-push" class="button primary" type="button">Включить уведомления</button>
                <button id="disable-push" class="button error" type="button" style="display:none;">Отключить уведомления</button>
            </footer>
        </div>
    </div>

    <div id="live-toast" class="live-toast" hidden></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
</body>
</html>
